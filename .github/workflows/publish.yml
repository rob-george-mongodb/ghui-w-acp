name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run package:smoke

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"

  standalone:
    needs: verify
    environment: npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: linux-x64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - run: bun run build:standalone -- ${{ matrix.target }}

      - run: bun run build:npm-packages -- ${{ matrix.target }}
        env:
          GHUI_REUSE_RELEASE_BINARY: "1"

      - name: Publish npm binary package
        run: |
          package_dir="dist/npm/binaries/${{ matrix.target }}"
          name="$(node -p "require('./${package_dir}/package.json').name")"
          version="$(node -p "require('./${package_dir}/package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} already published."
            exit 0
          fi
          npm publish "${package_dir}"

      - name: Upload standalone release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/release/ghui-${{ matrix.target }}.tar.gz" "dist/release/ghui-${{ matrix.target }}.tar.gz.sha256" --clobber

  publish:
    runs-on: ubuntu-latest
    needs: standalone
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - run: bun run build:npm-packages -- main

      - run: npm pack --dry-run
        working-directory: dist/npm/main

      - name: Publish npm package
        working-directory: dist/npm/main
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} already published."
            exit 0
          fi
          npm publish

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [publish, standalone]
    steps:
      - name: Download standalone checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/release
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern "*.sha256" --dir dist/release

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          : "${GH_TOKEN:?Set HOMEBREW_TAP_TOKEN to a token with access to kitlangton/homebrew-tap}"
          version="${GITHUB_REF_NAME#v}"
          cat dist/release/*.sha256 > dist/release/checksums.txt
          checksum() {
            awk -v file="$1" '$2 == file { print $1 }' dist/release/checksums.txt
          }
          gh api --method POST repos/kitlangton/homebrew-tap/dispatches \
            -f event_type=ghui-release \
            -f client_payload[tag]="${GITHUB_REF_NAME}" \
            -f client_payload[version]="${version}" \
            -f client_payload[darwin_arm64_sha256]="$(checksum ghui-darwin-arm64.tar.gz)" \
            -f client_payload[darwin_x64_sha256]="$(checksum ghui-darwin-x64.tar.gz)" \
            -f client_payload[linux_arm64_sha256]="$(checksum ghui-linux-arm64.tar.gz)" \
            -f client_payload[linux_x64_sha256]="$(checksum ghui-linux-x64.tar.gz)"
